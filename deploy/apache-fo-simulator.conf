<VirtualHost *:80>
    ServerName localhost
    DocumentRoot /mnt/e/Cursor-Project/FO-Simulator/dist

    <Directory /mnt/e/Cursor-Project/FO-Simulator/dist>
        Options FollowSymLinks
        AllowOverride None
        Require all granted
        FallbackResource /index.html
    </Directory>

    <Files "index.html">
        Header set Cache-Control "no-cache, no-store, must-revalidate"
        Header set Pragma "no-cache"
        Header set Expires "0"
    </Files>

    ErrorLog ${APACHE_LOG_DIR}/fo-simulator-error.log
    CustomLog ${APACHE_LOG_DIR}/fo-simulator-access.log combined
</VirtualHost>
